name: distribution_estimator-MAE-${fixed_columns.n_samples}

estimators:
  KSG:
    path: "./outputs/lowdim/2025-10-20/KSG"
    min_columns: ["estimator.k_neighbors"]
    fixed_columns: {}
    priority: 0
  WKL:
    path: "./outputs/lowdim/2025-10-20/WKL"
    min_columns: ["estimator.k_neighbors"]
    fixed_columns: {}
    priority: 0
  MINE-DV:
    path: "./outputs/lowdim/2025-10-20/MINE-DV"
    min_columns: ["estimator.estimator.backbone_factory.hidden_dim"]
    fixed_columns:
      estimator.estimator.estimate_size: 0.5
    priority: 1
  MINE-NWJ:
    path: "./outputs/lowdim/2025-10-20/MINE-NWJ"
    min_columns: ["estimator.estimator.backbone_factory.hidden_dim"]
    fixed_columns:
      estimator.estimator.estimate_size: 0.5
    priority: 1
  InfoNCE:
    path: "./outputs/lowdim/2025-10-20/MINE-DV"
    min_columns: ["estimator.estimator.backbone_factory.hidden_dim"]
    fixed_columns:
      estimator.estimator.estimate_size: 0.5
    priority: 2

target:
  name: "Ground-truth Mutual Information"
  function:
    _target_: __main__.MAE
    _partial_: true
    first: "distribution.mutual_information"
    second: "mutual_information.mean"

column_to_chart:
  name: "distribution.mutual_information"
  apply:
    _target_: builtins.int
    _partial_: true

rows_to_chart: ["Distribution", "Estimator"]
fixed_columns:
  n_samples: 10000